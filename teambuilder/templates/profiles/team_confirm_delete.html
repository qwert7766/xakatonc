{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление команды — {{ team.name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/teams.css' %}">
    <link rel="icon" type="image/gif" href="{% static 'img/logo.caf05db1.gif' %}">
</head>
<body>
    <main class="page" style="max-width:760px;margin:0 auto;padding:64px 24px;">
        <section class="delete-card">
            <p class="delete-eyebrow">Удаление</p>
            <h1 class="delete-title">Удалить команду?</h1>
            <p class="delete-text">
                Вы собираетесь удалить команду <span class="team-name">{{ team.name }}</span>.
                Это действие нельзя отменить.
            </p>

            <div class="delete-actions">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="delete-btn">Удалить команду</button>
                </form>
                <a href="{% url 'team_detail' team.id %}" class="delete-cancel">Отмена</a>
            </div>
        </section>
    </main>
</body>
</html>
