{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Team Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --black: #000000; --white: #FFFFFF; --pink: #FF3495;
            --gray-bg: #F2F2F2; --gray-text: #666666; --border: #E0E0E0;
            --font-heading: 'Barlow Condensed', sans-serif;
            --font-body: 'Barlow Semi Condensed', sans-serif;
        }
        body {
            font-family: var(--font-body);
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-img { height: 44px; }
        .logo-app-name {
            font-family: var(--font-heading); font-weight: 800; font-size: 14px;
            color: var(--white); letter-spacing: 3px; text-transform: uppercase;
            opacity: 0.5; padding-left: 12px; border-left: 1px solid rgba(255,255,255,0.2);
        }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }
        .login-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 48px 52px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }
        .eyebrow {
            font-family: var(--font-heading); font-size: 11px; font-weight: 700;
            letter-spacing: 4px; text-transform: uppercase; color: var(--pink);
            margin-bottom: 12px;
        }
        .login-title {
            font-family: var(--font-heading); font-weight: 900; font-size: 48px;
            text-transform: uppercase; letter-spacing: -2px; line-height: 0.9;
            margin-bottom: 36px;
        }
        .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .field label {
            font-family: var(--font-heading); font-size: 10px; font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.4);
        }
        .field input {
            font-family: var(--font-body); font-size: 15px; font-weight: 500;
            color: var(--white); background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.12); border-radius: 2px;
            padding: 13px 16px; outline: none; width: 100%; transition: border-color 0.15s;
        }
        .field input:focus { border-color: var(--pink); }
        .field input::placeholder { color: rgba(255,255,255,0.2); }
        .errors {
            font-size: 12px; color: var(--pink); font-weight: 600;
            background: rgba(255,52,149,0.1); border: 1px solid rgba(255,52,149,0.3);
            border-radius: 2px; padding: 10px 14px; margin-bottom: 20px;
        }
        .btn-submit {
            width: 100%; background: var(--pink); color: var(--white);
            font-family: var(--font-heading); font-weight: 900; font-size: 14px;
            letter-spacing: 2.5px; text-transform: uppercase; border: none;
            border-radius: 2px; padding: 18px; cursor: pointer; margin-top: 8px;
            transition: background 0.15s, transform 0.15s;
        }
        .btn-submit:hover { background: #ff1a80; transform: translateY(-1px); }
        .login-hint {
            margin-top: 20px; text-align: center; font-size: 13px;
            color: rgba(255,255,255,0.3);
        }
        .login-hint a { color: rgba(255,255,255,0.5); text-decoration: none; }
        .login-hint a:hover { color: var(--white); }
    </style>
</head>
<body>

<header class="header">
    <a href="/" class="logo">
        <img src="{% static 'img/logo.caf05db1.gif' %}" alt="t2" class="logo-img">
        <span class="logo-app-name">Team Builder</span>
    </a>
</header>

<main class="main">
    <div class="login-box">
        <p class="eyebrow">Руководителям</p>
        <h1 class="login-title">Войти<br>в систему</h1>

        {% if form.errors %}
            <div class="errors">Неверный логин или пароль. Попробуйте ещё раз.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="id_username">Логин</label>
                <input type="text" name="username" id="id_username"
                       placeholder="Ваш логин" autofocus autocomplete="username">
            </div>
            <div class="field">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password"
                       placeholder="••••••••" autocomplete="current-password">
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn-submit">Войти →</button>
        </form>

        <p class="login-hint">
            Сотрудник? <a href="{% url 'onboarding' %}">Заполните анкету здесь</a>
        </p>
    </div>
</main>

</body>
</html>
